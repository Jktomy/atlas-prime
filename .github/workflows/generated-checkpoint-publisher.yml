name: Generated checkpoint parity and publisher

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Exact canonical main SHA
        required: true
        type: string
      replay_nonce:
        description: Fresh public-clean replay nonce
        required: true
        type: string
      public_clean_confirmation:
        description: Must equal PUBLIC_CLEAN_CONFIRMED
        required: true
        type: string

permissions:
  contents: read

jobs:
  parity:
    name: parity (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.base_sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Verify owner, public-clean confirmation, and exact source
        shell: pwsh
        run: |
          if ('${{ github.actor }}' -ne '${{ github.repository_owner }}') { throw 'OWNER_REQUIRED' }
          if ('${{ inputs.public_clean_confirmation }}' -ne 'PUBLIC_CLEAN_CONFIRMED') { throw 'PUBLIC_CLEAN_CONFIRMATION_REQUIRED' }
          if ((git rev-parse HEAD) -ne '${{ inputs.base_sha }}') { throw 'BASE_CHECKOUT_MISMATCH' }
      - name: Build byte hash register
        run: python -B -m tools.generated_checkpoint.cli parity --repo-root . --output-dir "${{ runner.temp }}/generated-parity"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-parity-${{ matrix.label }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/generated-parity/hash-register.json
          retention-days: 14

  reconcile:
    name: reconcile exact Linux Windows bytes
    needs: parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.base_sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: generated-parity-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/parity
      - name: Compare exact registers
        run: python -B -m tools.generated_checkpoint.cli compare --left "${{ runner.temp }}/parity/generated-parity-ubuntu-${{ github.run_id }}-${{ github.run_attempt }}/hash-register.json" --right "${{ runner.temp }}/parity/generated-parity-windows-${{ github.run_id }}-${{ github.run_attempt }}/hash-register.json"

  publish:
    name: publish exact-base generated-only draft PR
    needs: reconcile
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.base_sha }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Publish immutable generated checkpoint
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -B -m tools.generated_checkpoint.cli publish --repo-root . --repository "${{ github.repository }}" --base-sha "${{ inputs.base_sha }}" --replay-nonce "${{ inputs.replay_nonce }}" --run-id "${{ github.run_id }}" --receipt "${{ runner.temp }}/generated-checkpoint-receipt.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-checkpoint-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/generated-checkpoint-receipt.json
          retention-days: 14
