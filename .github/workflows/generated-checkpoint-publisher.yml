name: Generated projection status

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Exact current canonical main SHA to inspect.
        required: true
        type: string
      public_clean_confirmation:
        description: Confirm that protected or private evidence is excluded from GitHub.
        required: true
        type: choice
        options:
          - PUBLIC_CLEAN_CONFIRMED

permissions:
  contents: read

concurrency:
  group: generated-projection-status-jktomy-atlas-prime
  cancel-in-progress: true

jobs:
  status:
    name: Check generated projection status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONDONTWRITEBYTECODE: "1"
      REQUESTED_BASE_SHA: ${{ inputs.base_sha }}
    steps:
      - name: Admit exact owner read-only request
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:GITHUB_REPOSITORY -cne "Jktomy/atlas-prime") {
            throw "Generated status repository identity rejected."
          }
          if (
            $env:GITHUB_ACTOR -cne $env:GITHUB_REPOSITORY_OWNER -or
            $env:GITHUB_TRIGGERING_ACTOR -cne $env:GITHUB_REPOSITORY_OWNER
          ) {
            throw "Generated status invoking identity rejected."
          }
          if ($env:GITHUB_REF -cne "refs/heads/main") {
            throw "Generated status ref rejected."
          }
          if ("${{ inputs.public_clean_confirmation }}" -cne "PUBLIC_CLEAN_CONFIRMED") {
            throw "Generated status public-clean confirmation rejected."
          }
          if ($env:REQUESTED_BASE_SHA -cnotmatch '^[0-9a-f]{40}$') {
            throw "Generated status base identity rejected."
          }
          $currentMain = (gh api "repos/$env:GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha').Trim()
          if ($LASTEXITCODE -ne 0 -or $currentMain -cnotmatch '^[0-9a-f]{40}$') {
            throw "Generated status current-main readback failed."
          }
          if ($currentMain -cne $env:REQUESTED_BASE_SHA) {
            throw "Generated status base is stale."
          }
      - name: Check out exact canonical base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Build and compare deterministic projections
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/generated-status/output" | Out-Null
          python -B tools/build_index.py `
            --repo-root . `
            --output-dir "$env:RUNNER_TEMP/generated-status/output" `
            --compare-dir generated `
            --hash-file "$env:RUNNER_TEMP/generated-status/SHA256SUMS.txt" `
            --status-file "$env:RUNNER_TEMP/generated-status/status.env"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $status = @{}
          Get-Content -LiteralPath "$env:RUNNER_TEMP/generated-status/status.env" | ForEach-Object {
            $parts = $_ -split '=', 2
            if ($parts.Count -eq 2) { $status[$parts[0]] = $parts[1] }
          }
          if ($status['ATLAS_GENERATED_INDEX_STATUS'] -eq 'CURRENT') {
            "Generated projections: CURRENT." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 0
          }
          if ($status['ATLAS_GENERATED_INDEX_STATUS'] -eq 'STALE') {
            "Generated projections: STALE." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "Changed outputs: $($status['CHANGED_FILES'])" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            throw "Generated projections are stale. Refresh them through an ordinary bounded local source transaction and reviewed draft PR."
          }
          throw "Generated projection status is invalid."
      - name: Upload sanitized read-only evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-projection-status-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/generated-status/
          if-no-files-found: warn
          retention-days: 7
