name: Generated checkpoint publisher

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Exact current canonical main SHA.
        required: true
        type: string
      mission_id:
        description: Fresh RP-C06 hosted mission identity.
        required: true
        type: string
      replay_nonce:
        description: Fresh public-clean replay nonce (24-200 characters).
        required: true
        type: string
      public_clean_confirmation:
        description: Confirm no protected or private evidence enters GitHub.
        required: true
        type: choice
        options:
          - PUBLIC_CLEAN_CONFIRMED
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GENERATED_BASE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.base_sha || github.sha }}
  GENERATED_MISSION_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.mission_id || format('RP-C08-GENERATED-AUTO-{0}-{1}', github.run_id, github.run_attempt) }}
  GENERATED_REPLAY_NONCE: ${{ github.event_name == 'workflow_dispatch' && inputs.replay_nonce || format('generated-checkpoint-auto-{0}-{1}', github.sha, github.run_attempt) }}
  GENERATED_PUBLIC_CLEAN_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.public_clean_confirmation || 'PUBLIC_CLEAN_CONFIRMED' }}

concurrency:
  group: generated-checkpoint-publisher-jktomy-atlas-prime
  cancel-in-progress: false

jobs:
  queue:
    name: Inspect generated checkpoint queue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      queue_result: ${{ steps.classify_queue.outputs.queue_result }}
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Admit exact publisher invocation
        id: admit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $hex40 = '^[0-9a-f]{40}$'
          $expectedRepository = "Jktomy/atlas-prime"
          $expectedOwner = "Jktomy"
          $expectedWorkflowRef = "Jktomy/atlas-prime/.github/workflows/generated-checkpoint-publisher.yml@refs/heads/main"

          if ($env:GITHUB_REPOSITORY -cne $expectedRepository) {
            throw "Publisher repository identity rejected."
          }
          if ($env:GITHUB_REPOSITORY_OWNER -cne $expectedOwner) {
            throw "Publisher owner identity rejected."
          }
          if (
            $env:GITHUB_ACTOR -cne $expectedOwner -or
            $env:GITHUB_TRIGGERING_ACTOR -cne $expectedOwner
          ) {
            throw "Publisher invoking identity rejected."
          }
          if ($env:GITHUB_REF -cne "refs/heads/main") {
            throw "Publisher ref rejected."
          }
          if ($env:GITHUB_WORKFLOW_REF -cne $expectedWorkflowRef) {
            throw "Publisher workflow ref rejected."
          }
          foreach ($value in @(
            $env:GITHUB_SHA,
            $env:GITHUB_WORKFLOW_SHA,
            $env:GENERATED_BASE_SHA
          )) {
            if ($value -cnotmatch $hex40) {
              throw "Publisher SHA identity rejected."
            }
          }

          if ($env:GITHUB_EVENT_NAME -ceq "push") {
            if (
              $env:GENERATED_BASE_SHA -cne $env:GITHUB_SHA -or
              $env:GITHUB_SHA -cne $env:GITHUB_WORKFLOW_SHA
            ) {
              throw "Publisher push base rejected."
            }
          }
          elseif ($env:GITHUB_EVENT_NAME -ceq "workflow_dispatch") {
            if ($env:GENERATED_PUBLIC_CLEAN_CONFIRMATION -cne "PUBLIC_CLEAN_CONFIRMED") {
              throw "Publisher public-clean confirmation rejected."
            }
            if (
              $env:GENERATED_BASE_SHA -cne $env:GITHUB_WORKFLOW_SHA -or
              $env:GITHUB_SHA -cne $env:GITHUB_WORKFLOW_SHA
            ) {
              throw "Publisher dispatch base rejected."
            }
          }
          else {
            throw "Publisher event rejected."
          }

          $currentMain = (gh api "repos/$env:GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha').Trim()
          if ($LASTEXITCODE -ne 0 -or $currentMain -cnotmatch $hex40) {
            throw "Publisher current-main readback failed."
          }
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/queue-evidence" | Out-Null
          $admission = [ordered]@{
            result = "ADMITTED"
            repository = $env:GITHUB_REPOSITORY
            event_name = $env:GITHUB_EVENT_NAME
            event_base_sha = $env:GENERATED_BASE_SHA
            current_main_sha = $currentMain
            workflow_ref = $env:GITHUB_WORKFLOW_REF
            workflow_source_sha = $env:GITHUB_WORKFLOW_SHA
            workflow_run_id = $env:GITHUB_RUN_ID
            workflow_run_attempt = $env:GITHUB_RUN_ATTEMPT
            actor = $env:GITHUB_ACTOR
            triggering_actor = $env:GITHUB_TRIGGERING_ACTOR
            mutation_authorized = $false
          }
          $admission | ConvertTo-Json -Compress | Set-Content -LiteralPath "$env:RUNNER_TEMP/queue-evidence/admission.json" -Encoding utf8
          "GENERATED_CURRENT_MAIN_SHA=$currentMain" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Check out exact workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Read bounded open pull-request queue
        shell: bash
        run: |
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --limit 1001 \
            --json number,state,isDraft,isCrossRepository,author,headRefName,headRefOid,headRepository,headRepositoryOwner,baseRefName,baseRefOid,title,body \
            --jq 'sort_by(.number) | map({number: .number, state: .state, isDraft: .isDraft, isCrossRepository: .isCrossRepository, authorLogin: .author.login, authorIsBot: .author.is_bot, headRefName: .headRefName, headRefOid: .headRefOid, headRepositoryNameWithOwner: .headRepository.nameWithOwner, headRepositoryOwnerLogin: .headRepositoryOwner.login, baseRefName: .baseRefName, baseRefOid: .baseRefOid, title: .title, body: .body})' \
            > "$RUNNER_TEMP/open-pull-requests.json"
      - name: Classify generated checkpoint queue
        id: classify_queue
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/queue-evidence" | Out-Null
          python -B -m tools.generated_checkpoint.queue `
            --pull-requests "$env:RUNNER_TEMP/open-pull-requests.json" `
            --repository "$env:GITHUB_REPOSITORY" `
            --event-name "$env:GITHUB_EVENT_NAME" `
            --event-base-sha "$env:GENERATED_BASE_SHA" `
            --current-main-sha "$env:GENERATED_CURRENT_MAIN_SHA" `
            --workflow-ref "$env:GITHUB_WORKFLOW_REF" `
            --workflow-source-sha "$env:GITHUB_WORKFLOW_SHA" `
            --workflow-run-id "$env:GITHUB_RUN_ID" `
            --workflow-run-attempt "$env:GITHUB_RUN_ATTEMPT" `
            --actor "$env:GITHUB_ACTOR" `
            --triggering-actor "$env:GITHUB_TRIGGERING_ACTOR" `
            --repository-owner "$env:GITHUB_REPOSITORY_OWNER" `
            --credential-principal "github-actions[bot]" `
            --credential-mode "GITHUB_TOKEN" |
            Tee-Object -FilePath "$env:RUNNER_TEMP/queue-evidence/queue-receipt.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $receipt = Get-Content -LiteralPath "$env:RUNNER_TEMP/queue-evidence/queue-receipt.json" -Raw | ConvertFrom-Json
          $result = [string]$receipt.result
          if ($receipt.repository -cne $env:GITHUB_REPOSITORY) {
            throw "Generated checkpoint queue receipt repository is inconsistent."
          }
          if (
            $receipt.event_base_sha -cne $env:GENERATED_BASE_SHA -or
            $receipt.current_main_sha -cne $env:GENERATED_CURRENT_MAIN_SHA -or
            $receipt.workflow_source_sha -cne $env:GITHUB_WORKFLOW_SHA
          ) {
            throw "Generated checkpoint queue receipt base binding is inconsistent."
          }
          if (
            [int]$receipt.query.limit -ne 1001 -or
            [int]$receipt.query.max_accepted_entries -ne 1000 -or
            [int]$receipt.query.returned_count -gt 1000
          ) {
            throw "Generated checkpoint queue receipt query boundary is inconsistent."
          }
          if ([string]$receipt.receipt_sha256 -notmatch '^[0-9a-f]{64}$') {
            throw "Generated checkpoint queue receipt hash is invalid."
          }
          if ($receipt.mutation_authorized -ne $false -or $null -ne $receipt.error_code) {
            throw "Generated checkpoint queue receipt authorizes mutation or reports an error."
          }
          if ($result -eq "CLEAR") {
            if ([int]$receipt.open_checkpoint_count -ne 0 -or $null -ne $receipt.checkpoint) {
              throw "Generated checkpoint CLEAR queue receipt is inconsistent."
            }
            "queue_result=CLEAR" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "Generated checkpoint queue: CLEAR." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          elseif ($result -eq "DEFERRED_OPEN_CHECKPOINT") {
            if ([int]$receipt.open_checkpoint_count -ne 1 -or $null -eq $receipt.checkpoint) {
              throw "Generated checkpoint deferred queue receipt is inconsistent."
            }
            if ($receipt.mutation_authorized -ne $false) {
              throw "Generated checkpoint deferred queue receipt authorizes mutation."
            }
            "queue_result=DEFERRED_OPEN_CHECKPOINT" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "Generated checkpoint queue: DEFERRED while draft PR #$($receipt.checkpoint.number) remains open. No mutation attempted." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          else {
            throw "Generated checkpoint queue returned an unknown result."
          }
      - name: Upload sanitized queue evidence
        if: always() && steps.admit.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-checkpoint-queue-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/queue-evidence/
          if-no-files-found: error
          retention-days: 14

  parity:
    name: Build register (${{ matrix.platform }})
    needs: queue
    if: >-
      needs.queue.result == 'success' &&
      needs.queue.outputs.queue_result == 'CLEAR'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Build deterministic register
        shell: pwsh
        run: |
          python -B -m tools.generated_checkpoint.cli build-register `
            --repo-root . `
            --output "$env:RUNNER_TEMP/hash-register.json" `
            --mission-id "$env:GENERATED_MISSION_ID" `
            --base-sha "$env:GENERATED_BASE_SHA" `
            --replay-nonce "$env:GENERATED_REPLAY_NONCE" `
            --workflow-ref $env:GITHUB_WORKFLOW_REF `
            --workflow-source-sha $env:GITHUB_WORKFLOW_SHA `
            --workflow-run-id $env:GITHUB_RUN_ID `
            --workflow-run-attempt $env:GITHUB_RUN_ATTEMPT
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload sanitized platform register
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-register-${{ matrix.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/hash-register.json
          if-no-files-found: error
          retention-days: 14

  reconcile:
    name: Reconcile exact hosted parity
    needs: parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Download Ubuntu register
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: generated-register-ubuntu-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/parity/ubuntu
      - name: Download Windows register
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: generated-register-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/parity/windows
      - name: Require byte-identical registers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/reconciled" | Out-Null
          python -B -m tools.generated_checkpoint.cli reconcile `
            --ubuntu-register "$env:RUNNER_TEMP/parity/ubuntu/hash-register.json" `
            --windows-register "$env:RUNNER_TEMP/parity/windows/hash-register.json" `
            --output "$env:RUNNER_TEMP/reconciled/reconciliation.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Copy-Item -LiteralPath "$env:RUNNER_TEMP/parity/ubuntu/hash-register.json" -Destination "$env:RUNNER_TEMP/reconciled/hash-register.json"
      - name: Upload sanitized reconciliation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-reconciliation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/reconciled/
          if-no-files-found: error
          retention-days: 14

  prepare:
    name: Prepare package or prove no generated delta
    needs: reconcile
    if: >-
      needs.reconcile.result == 'success' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && github.sha == github.workflow_sha) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.public_clean_confirmation == 'PUBLIC_CLEAN_CONFIRMED' &&
          inputs.base_sha == github.workflow_sha
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      route_result: ${{ steps.prepare_checkpoint.outputs.route_result }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact canonical base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.GENERATED_BASE_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Download exact reconciliation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: generated-reconciliation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/reconciled
      - name: Classify delta and prepare immutable route evidence
        id: prepare_checkpoint
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/evidence" | Out-Null
          python -B -m tools.generated_checkpoint.hosted_prepare `
            --repo-root . `
            --register "$env:RUNNER_TEMP/reconciled/hash-register.json" `
            --reconciliation "$env:RUNNER_TEMP/reconciled/reconciliation.json" `
            --package-root "$env:RUNNER_TEMP/checkpoint-package" `
            --replay-nonce "$env:GENERATED_REPLAY_NONCE" `
            --public-clean-confirmation "$env:GENERATED_PUBLIC_CLEAN_CONFIRMATION" `
            --event-name "${{ github.event_name }}" |
            Tee-Object -FilePath "$env:RUNNER_TEMP/evidence/package-preparation.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $preparationPath = "$env:RUNNER_TEMP/evidence/package-preparation.json"
          if (-not (Test-Path -LiteralPath $preparationPath -PathType Leaf)) {
            throw "Generated checkpoint preparation receipt is absent."
          }
          $preparation = Get-Content -LiteralPath $preparationPath -Raw | ConvertFrom-Json
          $routeResult = [string]$preparation.result
          if ($routeResult -eq "NOOP") {
            if ([int]$preparation.changed_count -ne 0 -or @($preparation.changed_paths).Count -ne 0) {
              throw "Generated checkpoint NOOP receipt contains a delta."
            }
            if ([string]$preparation.receipt_sha256 -notmatch '^[0-9a-f]{64}$') {
              throw "Generated checkpoint NOOP receipt hash is invalid."
            }
            $noopPath = "$env:RUNNER_TEMP/checkpoint-package/noop-receipt.json"
            if (-not (Test-Path -LiteralPath $noopPath -PathType Leaf)) {
              throw "Generated checkpoint NOOP receipt file is absent."
            }
            "route_result=NOOP" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "Generated checkpoint result: NOOP; committed reports already match deterministic output." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          elseif ($routeResult -eq "PACKAGE_PREPARED") {
            $missionPath = "$env:RUNNER_TEMP/checkpoint-package/mission.json"
            if (-not (Test-Path -LiteralPath $missionPath -PathType Leaf)) {
              throw "Generated checkpoint mission is absent."
            }
            "route_result=PACKAGE_PREPARED" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            throw "Generated checkpoint preparation returned an unknown result."
          }
      - name: Upload sanitized preparation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-checkpoint-preparation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/evidence/
            ${{ runner.temp }}/reconciled/
            ${{ runner.temp }}/checkpoint-package/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Invoke singular Thread Engine and stop at draft readback
    needs:
      - reconcile
      - prepare
    if: >-
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.route_result == 'PACKAGE_PREPARED' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && github.sha == github.workflow_sha) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.public_clean_confirmation == 'PUBLIC_CLEAN_CONFIRMED' &&
          inputs.base_sha == github.workflow_sha
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.bind_draft.outputs.pr_number }}
      head_branch: ${{ steps.bind_draft.outputs.head_branch }}
      head_sha: ${{ steps.bind_draft.outputs.head_sha }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out exact canonical base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.GENERATED_BASE_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Download prepared immutable package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: generated-checkpoint-preparation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}
      - name: Bind prepared mission and isolated work root
        shell: pwsh
        run: |
          $missionPath = "$env:RUNNER_TEMP/checkpoint-package/mission.json"
          if (-not (Test-Path -LiteralPath $missionPath -PathType Leaf)) {
            throw "Prepared generated checkpoint mission is absent."
          }
          $mission = Get-Content -LiteralPath $missionPath -Raw | ConvertFrom-Json
          "MISSION_SHA256=$($mission.mission_sha256)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/thread-engine-work" | Out-Null
      - name: Configure ephemeral GitHub credential helper
        run: gh auth setup-git
      - name: Configure ephemeral Git commit identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Invoke only the singular Thread Engine
        shell: bash
        run: |
          set -o pipefail
          python -B -m production_adapter.cli \
            --mission "$RUNNER_TEMP/checkpoint-package/mission.json" \
            --mission-sha256 "$MISSION_SHA256" \
            --mission-scoped-draft-pr \
            --execute-draft-pr \
            --generated-checkpoint-route \
            --work-root "$RUNNER_TEMP/thread-engine-work" \
            > "$RUNNER_TEMP/evidence/thread-engine-receipt.json" \
            2> "$RUNNER_TEMP/evidence/thread-engine-rejection.json"
        working-directory: tools/thread-engine
      - name: Bind exact generated draft readback
        id: bind_draft
        shell: pwsh
        run: |
          $receiptPath = "$env:RUNNER_TEMP/evidence/thread-engine-receipt.json"
          if (-not (Test-Path -LiteralPath $receiptPath -PathType Leaf)) {
            throw "Thread Engine success receipt is absent."
          }
          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json
          if ($receipt.result -ne "SUCCESS") {
            throw "Thread Engine did not report SUCCESS."
          }
          $readback = $receipt.pr_readback
          if ($null -eq $readback -or $readback.isDraft -ne $true) {
            throw "Generated pull request is absent or not draft."
          }
          $prNumber = [int]$readback.number
          $headBranch = [string]$readback.headRefName
          $headSha = [string]$readback.headRefOid
          $baseSha = [string]$readback.baseRefOid
          if ($prNumber -lt 1) { throw "Generated pull-request number is invalid." }
          if ($headBranch -notmatch '^generated/checkpoint-[a-z0-9-]+-[0-9a-f]{12}$') {
            throw "Generated branch identity is invalid."
          }
          if ($headSha -notmatch '^[0-9a-f]{40}$') {
            throw "Generated head SHA is invalid."
          }
          if ($baseSha -ne $env:GENERATED_BASE_SHA) {
            throw "Generated draft base does not match the exact publisher base."
          }
          "pr_number=$prNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "head_branch=$headBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "head_sha=$headSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Upload sanitized route evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-checkpoint-route-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/evidence/
            ${{ runner.temp }}/reconciled/
            ${{ runner.temp }}/checkpoint-package/
          if-no-files-found: error
          retention-days: 14

  validate_exact_head:
    name: Validate generated exact head (${{ matrix.os }})
    needs: publish
    if: needs.publish.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out immutable generated head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.publish.outputs.head_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Require exact generated head
        shell: pwsh
        env:
          EXPECTED_HEAD_SHA: ${{ needs.publish.outputs.head_sha }}
        run: |
          $observed = (git rev-parse HEAD).Trim()
          if ($observed -ne $env:EXPECTED_HEAD_SHA) {
            throw "Exact generated head checkout failed."
          }
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Prime kernel checks
        run: python -B tests/bootstrap/test_prime_kernel.py
      - name: Prime repository policy tests
        run: python -B -m unittest discover -s tests/repository-policy -p "test_*.py" -v
      - name: Prime privacy boundary tests
        run: python -B -m unittest discover -s tests/privacy -p "test_*.py" -v
      - name: Prime lifecycle contract tests
        run: python -B -m unittest discover -s tests/lifecycle -p "test_*.py" -v
      - name: Full Prime Thread Engine tests
        run: python -B -m unittest discover -s tools/thread-engine/tests -p "test_*.py" -v
      - name: Thread Engine static checks
        run: python -B tools/thread-engine/tests/static_checks.py
      - name: Atlas Sword static checks
        run: python -B tools/atlas-sword/tests/static_checks.py
      - name: Prime generator tests
        run: python -B -m unittest discover -s tests/generators -p "test_*.py" -v
      - name: Prime whole-program tests
        run: python -B -m unittest discover -s tests/prime-program -p "test_*.py" -v
      - name: Athena execution route tests
        run: python -B -m unittest discover -s tests/athena-routes -p "test_*.py" -v
      - name: Prime source validation
        run: python -B tools/prime_checks/validate_prime.py
      - name: Prove active PowerShell launcher resolution
        shell: pwsh
        run: |
          $result = & ./tools/thread-engine/Invoke-AtlasThreadEngineProductionAdapter.ps1 -ResolverSelfTest | ConvertFrom-Json
          if ($result.invocation -ne "native-argument-array") {
            throw "Prime production launcher did not use native argument-array invocation"
          }
          if ($result.implementation_state -ne "THREAD_ENGINE_ACTIVE_MISSION_SCOPED") {
            throw "Prime production launcher did not report active mission-scoped state"
          }
          Write-Host "Prime production launcher active resolver proof: PASS"
