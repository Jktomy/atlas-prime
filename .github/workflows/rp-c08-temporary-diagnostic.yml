name: RP-C08 temporary whole-program diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    name: Capture whole-program failure tail
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull-request merge ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Capture whole-program output without masking artifact upload
        shell: bash
        run: |
          set +e
          python -B -m unittest discover -s tests/prime-program -p "test_*.py" -v > "$RUNNER_TEMP/rp-c08-whole-program.log" 2>&1
          code=$?
          printf '%s\n' "$code" > "$RUNNER_TEMP/rp-c08-whole-program-exit-code.txt"
          exit 0
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rp-c08-whole-program-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/rp-c08-whole-program.log
            ${{ runner.temp }}/rp-c08-whole-program-exit-code.txt
          if-no-files-found: error
          retention-days: 1
