name: Prime read-only validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prime kernel checks
        run: python -B tests/bootstrap/test_prime_kernel.py
      - name: Prime repository policy tests
        run: python -B -m unittest discover -s tests/repository-policy -p "test_*.py" -v
      - name: Prime privacy boundary tests
        run: python -B -m unittest discover -s tests/privacy -p "test_*.py" -v
      - name: Full Prime Thread Engine tests
        run: python -B -m unittest discover -s tools/thread-engine/tests -p "test_*.py" -v
      - name: Thread Engine static checks
        run: python -B tools/thread-engine/tests/static_checks.py
      - name: Atlas Sword static checks
        run: python -B tools/atlas-sword/tests/static_checks.py
      - name: Prime generator tests
        run: python -B -m unittest discover -s tests/generators -p "test_*.py" -v
      - name: Prime whole-program tests
        run: python -B -m unittest discover -s tests/prime-program -p "test_*.py" -v
      - name: Prime source validation
        run: python -B tools/prime_checks/validate_prime.py
      - name: Prove active PowerShell launcher resolution
        shell: pwsh
        run: |
          $result = & ./tools/thread-engine/Invoke-AtlasThreadEngineProductionAdapter.ps1 -ResolverSelfTest | ConvertFrom-Json
          if ($result.invocation -ne "native-argument-array") {
            throw "Prime production launcher did not use native argument-array invocation"
          }
          if ($result.implementation_state -ne "THREAD_ENGINE_ACTIVE_MISSION_SCOPED") {
            throw "Prime production launcher did not report active mission-scoped state"
          }
          Write-Host "Prime production launcher active resolver proof: PASS"
