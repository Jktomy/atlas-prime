name: Prime read-only validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      include_windows:
        description: Run the complete Windows validation companion.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: prime-readonly-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      windows_required: ${{ steps.plan_targeted.outputs.windows_required || steps.plan_full.outputs.windows_required }}
      profile: ${{ steps.plan_targeted.outputs.profile || steps.plan_full.outputs.profile }}
      check_count: ${{ steps.plan_targeted.outputs.check_count || steps.plan_full.outputs.check_count }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Plan targeted pull-request validation
        id: plan_targeted
        if: github.event_name == 'pull_request'
        run: >-
          python -B tools/prime_checks/targeted_validation.py
          --base "$BASE_SHA"
          --head "$HEAD_SHA"
          --plan-only
          --github-output "$GITHUB_OUTPUT"
      - name: Plan explicit full validation
        id: plan_full
        if: github.event_name == 'workflow_dispatch'
        run: >-
          python -B tools/prime_checks/targeted_validation.py
          --full
          --plan-only
          --github-output "$GITHUB_OUTPUT"
      - name: Run targeted pull-request validation
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/prime-validation"
          python -B tools/prime_checks/targeted_validation.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            2>&1 | tee "$RUNNER_TEMP/prime-validation/validation.log"
      - name: Run explicit full validation
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/prime-validation"
          python -B tools/prime_checks/targeted_validation.py --full \
            2>&1 | tee "$RUNNER_TEMP/prime-validation/validation.log"
      - name: Upload bounded failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prime-validation-failure-ubuntu-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/prime-validation/validation.log
          if-no-files-found: error
          retention-days: 7
      - name: Record validation profile
        if: always()
        run: |
          echo "Validation profile: ${{ steps.plan_targeted.outputs.profile || steps.plan_full.outputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Selected checks: ${{ steps.plan_targeted.outputs.check_count || steps.plan_full.outputs.check_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Windows companion required: ${{ steps.plan_targeted.outputs.windows_required || steps.plan_full.outputs.windows_required }}" >> "$GITHUB_STEP_SUMMARY"

  validate_windows:
    name: validate (windows-latest)
    needs: validate
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      (
        (github.event_name == 'pull_request' && needs.validate.outputs.windows_required == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.include_windows == true)
      )
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Run targeted Windows validation
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/prime-validation" | Out-Null
          python -B tools/prime_checks/targeted_validation.py `
            --base "$env:BASE_SHA" `
            --head "$env:HEAD_SHA" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP/prime-validation/validation.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run explicit full Windows validation
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/prime-validation" | Out-Null
          python -B tools/prime_checks/targeted_validation.py --full 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP/prime-validation/validation.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload bounded failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prime-validation-failure-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/prime-validation/validation.log
          if-no-files-found: error
          retention-days: 7
