name: Prime read-only validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prime kernel checks
        run: python -B tests/bootstrap/test_prime_kernel.py
      - name: Compile Thread Engine port candidate
        run: python -B -m compileall -q tools/thread-engine
