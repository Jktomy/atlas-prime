policy_id: atlas-prime-protected-paths
policy_version: 0.2.0
status: PREVIEW
mode: DENY_BY_DEFAULT
repository: Jktomy/atlas-prime
principles:
- A packet-local field cannot lower protection.
- The existing Spear v0.3 foundation controls over conflicting older Codex terminology
  during reconciliation.
- A successful parser or test does not grant source authority.
- Protected evidence remains outside GitHub.
- Spear and Phoenix Reborn must remain independently recoverable and auditable.
- Direct-main, force update, automated merge, and unreviewed self-modification are
  forbidden.
actors:
  ATHENA:
    may:
    - READ
    - ANALYZE
    - AUTHOR_PREVIEW
    - AUTHOR_COMPLETE_PAYLOADS
    may_not:
    - SELF_APPROVE_EXECUTION
    - MERGE
    - BYPASS_PREVIEW_EXECUTE
  SPEAR:
    may:
    - PLAN_REGISTERED_OPERATIONS
    may_not:
    - WRITE_UNTIL_SEPARATELY_ACTIVATED
    - DECIDE_PROMOTION
    - MODIFY_SELF
    - MODIFY_PHOENIX_REBORN
    - MERGE
    - WRITE_MAIN
  NOCTUA:
    may:
    - READ
    - AUDIT
    - VERIFY
    - ISSUE_OUTCOME
    may_not:
    - AUTHORIZE_WRITE_BY_ITSELF
    - MERGE
    - PROMOTE
  JAYSON:
    may:
    - DIRECT
    - APPROVE_EXECUTION
    - MANUALLY_MERGE
    - APPROVE_CUTOVER
    note: High-risk actions still require the applicable Preview, evidence, and explicit
      bounded approval.
protected_sets:
- id: prime-root-governance
  level: CRITICAL
  match:
    exact:
    - README.md
    - bootstrap.md
    - atlas-start-here.md
    - atlas-prime.md
    - atlas-index.md
    - atlas-command-surface.md
    - atlas-command-surface-dashboard.md
    - atlas-protocol-registry.md
    - atlas-knowledge-lifecycle.md
    - atlas-aegis.md
    - athenas-spear.md
    - noctua.md
    - sunsetting-protocol.md
    - controlled-burn-protocol.md
    - phoenix-flare.md
    - phoenix-burn-protocol.md
    - phoenix-reborn.md
    - codex/codex-source-update-standard.md
    prefixes:
    - codex/governance/
  normal_spear_mutation: DENY
  required_route: SEPARATE_PREVIEW_EXECUTE_SOURCE_PR
  controls:
  - COMPLETE_CURRENT_READBACK
  - EXACT_BEFORE_HASH
  - COMPLETE_PROPOSED_FILE
  - EXACT_AFTER_HASH
  - DECLARED_REMOVALS
  - ROUTE_VALIDATION
  - FULL_DIFF
  - NOCTUA
  - JAYSON_MANUAL_MERGE
- id: prime-format-contracts
  level: CRITICAL
  match:
    exact:
    - .gitignore
    - .gitattributes
    - templates/source-file.md
    prefixes:
    - specs/atlas-prime/
    - schemas/atlas-prime/
    - schemas/source-metadata/
    - schemas/migration/
    - policies/destination/
    - policies/protected-paths/
    - schemas/policies/
  normal_spear_mutation: DENY
  required_route: SEPARATE_FORMAT_CONTRACT_UPDATE
  controls:
  - COMPATIBILITY_ANALYSIS
  - SCHEMA_VALIDATION
  - POLICY_CROSS_CHECK
  - MIGRATION_IMPACT_ANALYSIS
  - FULL_DIFF
  - NOCTUA
  - JAYSON_MANUAL_MERGE
- id: spear-self-protection
  level: CRITICAL
  match:
    prefixes:
    - tools/spear/
    - specs/spear/
    - schemas/spear/
    - policies/operations/spear
    - tests/spear/
    - tests/fixtures/spear/
    - schemas/lifecycle/
    - schemas/quests/
    - schemas/golden-wing/
    exact:
    - .github/workflows/spear.yml
    - .github/workflows/athenas-spear.yml
  normal_spear_mutation: DENY
  required_route: SEPARATE_SPEAR_ENGINE_UPDATE
  controls:
  - NO_PACKET_SELECTED_CODE
  - NO_PACKET_SELECTED_ENDPOINT
  - NO_PACKET_SELECTED_ENVIRONMENT
  - CREDENTIAL_ISOLATION_PROOF
  - ADVERSARIAL_TESTS
  - NOCTUA
  - JAYSON_MANUAL_MERGE
- id: phoenix-reborn-independence
  level: CRITICAL
  match:
    prefixes:
    - tools/phoenix/
    - specs/phoenix/
    - schemas/phoenix/
    - policies/phoenix/
    - tests/phoenix/
    exact:
    - phoenix-reborn.md
    - .github/workflows/phoenix-reborn.yml
  normal_spear_mutation: DENY
  required_route: SEPARATE_PHOENIX_UPDATE
  controls:
  - NO_SPEAR_DEPENDENCY
  - NO_SPEAR_WRITER_CREDENTIALS
  - ISOLATED_RESTORE_TEST
  - TAMPER_DETECTION
  - DETERMINISTIC_RECEIPT
  - NOCTUA
  - JAYSON_MANUAL_MERGE
- id: github-workflows
  level: CRITICAL
  match:
    prefixes:
    - .github/workflows/
  normal_spear_mutation: DENY
  required_route: SEPARATE_WORKFLOW_UPDATE
  controls:
  - PINNED_ACTIONS
  - MINIMUM_PERMISSIONS
  - NO_UNTRUSTED_CODE_EXECUTION
  - NO_SECRET_OUTPUT
  - NOCTUA
- id: structured-authoritative-registers
  level: HIGH
  match:
    prefixes:
    - codex/quests/
    - codex/golden-wing/
  normal_spear_mutation: REGISTERED_HIGH_LEVEL_OPERATION_ONLY
  required_route: VERSIONED_SCHEMA_AND_TRANSITION_CONTRACT
  controls:
  - STABLE_RECORD_IDS
  - EXPECTED_RECORD_VERSION
  - EXPECTED_REGISTRY_HASH
  - APPEND_ONLY_EVENT
  - ATOMIC_PROJECTION_REGENERATION
  - DETERMINISTIC_SERIALIZATION
  - NOCTUA
- id: monthly-feathers
  level: HIGH
  match:
    prefixes:
    - atlas-feather-archives/
  normal_spear_mutation: APPEND_FEATHER_OPERATION_ONLY
  required_route: SUNSET_FEATHER_CONTRACT
  controls:
  - ATHENA_AUTHORED_SEMANTICS
  - UNIQUE_FEATHER_ID
  - CLOSURE_TIMESTAMP_MONTH_ROUTING
  - EXACT_CURRENT_HASH
  - CLOSED_MONTH_BLOCK
  - DATED_ADDENDUM_FOR_LATE_MATERIAL
  - AMENDMENT_NOT_SILENT_REWRITE
  - READBACK_BEFORE_ABSORBED
- id: generated-projections
  level: HIGH
  match:
    prefixes:
    - generated/
    exact:
    - codex/atlas-quest-board.md
  normal_spear_mutation: REGISTERED_GENERATOR_ONLY
  required_route: GENERATOR_CONTRACT
  controls:
  - NO_DIRECT_EDIT
  - DECLARED_AUTHORITATIVE_INPUTS
  - REPRODUCIBLE_OUTPUT
  - SOURCE_COMMIT_RECEIPT
  - SEPARATE_GENERATED_PR_EXCEPT_QUEST_BOARD
- id: migration-evidence
  level: HIGH
  match:
    prefixes:
    - migration/
  normal_spear_mutation: MIGRATION_OPERATION_ONLY
  required_route: MIGRATION_PREVIEW_EXECUTE
  controls:
  - EVERY_PREDECESSOR_PATH_INVENTORIED
  - EXPLICIT_DISPOSITION
  - NO_RAW_PROTECTED_EVIDENCE
  - PACKET_PR_COMMIT_LINEAGE
  - READBACK_VERIFICATION
  - ZERO_UNEXPLAINED_OMISSION
content_boundaries:
  prohibited_raw_content:
  - PASSWORDS
  - API_KEYS
  - TOKENS
  - MFA_OR_RECOVERY_CODES
  - PRIVATE_KEYS
  - SEED_PHRASES
  - REAL_ENV_VALUES
  - RAW_PHI
  - RAW_FINANCE_OR_ACCOUNT_EVIDENCE
  - PRIVATE_RUNTIME_REGISTERS
  - IP_ADDRESSES
  - NETWORK_MAPS
  - DEVICE_REGISTERS
  - PRIVATE_INFRASTRUCTURE_PATHS
  - PROTECTED_EXPORTS
  permitted_forms:
  - PUBLIC_CLEAN
  - PRIVATE_CLEAN_SUMMARY
  - POINTER_ONLY
  - REDACTED_TEST_FIXTURE
  scanner_is_proof_of_absence: false
  diagnostics_must_redact_matches: true
globally_denied_operations:
- DIRECT_MAIN_WRITE
- FORCE_PUSH
- AUTOMATIC_MERGE
- HARD_DELETE
- MOVE_OR_RENAME
- ARCHIVE_EXECUTION
- PACKET_SELECTED_SCRIPT
- PACKET_SELECTED_MODULE
- PACKET_SELECTED_SHELL_COMMAND
- PACKET_SELECTED_GITHUB_ENDPOINT
- PACKET_SELECTED_ENVIRONMENT_VARIABLE
- SPEAR_SELF_MODIFICATION
- SPEAR_MODIFICATION_OF_PHOENIX_REBORN
- SILENT_SOURCE_PROMOTION
- SILENT_SUPERSESSION
- SILENT_HISTORY_REWRITE
separate_approval_required:
- REPOSITORY_SETTING_CHANGE
- WORKFLOW_OR_AUTOMATION_CHANGE
- N8N_CREATION_OR_UPDATE
- GOOGLE_DRIVE_WRITE_OR_MOVE
- MIGRATION_EXECUTION
- CUTOVER
- RETIREMENT
- DELETION
- SPEAR_WRITER_ACTIVATION
- PHOENIX_REBORN_UPLOAD_ACTIVATION
exceptions:
  packet_local_override_allowed: false
  implicit_override_allowed: false
  emergency_bypass_allowed: false
  change_method: VERSIONED_POLICY_UPDATE_THROUGH_PREVIEW_EXECUTE_AND_NOCTUA
