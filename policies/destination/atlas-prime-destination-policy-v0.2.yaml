policy_id: atlas-prime-destination-policy
policy_version: 0.2.0
status: PREVIEW
mode: V03_CONTRACT_PREVIEW
repository: Jktomy/atlas-prime
repository_state: SHADOW
authority:
  repository_writes_authorized: false
  compatible_spear_contracts:
  - athenas-spear/0.3
  registered_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
  - APPEND_FEATHER_ENTRY
  - APPLY_QUEST_DELTA
  - GENERATE_QUEST_BOARD
  - APPLY_SUNSET_LIFECYCLE
  execution_authorized_operations: []
  note: This policy co-designs path routing with Spear v0.3 but grants no repository
    write authority. Writer activation requires a separate Preview -> Execute gate.
source_control:
  allowed_base_refs:
  - main
  denied_write_refs:
  - main
  - master
  - HEAD
  future_transaction_branch_regex: ^spear/[0-9]{8}-[0-9]{3}-[a-f0-9]{8}$
  new_branch_required: true
  branch_must_not_preexist: true
  draft_pull_request_required: true
  direct_main_allowed: false
  force_update_allowed: false
  automatic_merge_allowed: false
  merge_authority:
  - JAYSON_MANUAL
  one_repository_per_transaction: true
path_safety:
  default: DENY
  unicode_normalization: NFC
  reject_absolute_paths: true
  reject_backslashes: true
  reject_traversal: true
  reject_percent_encoded_traversal: true
  reject_control_characters: true
  reject_trailing_space_or_dot: true
  reject_case_collisions: true
  reject_symlinks: true
  reject_submodules: true
  reject_nested_archives: true
  reject_binary_content_by_default: true
  max_path_bytes: 500
path_classes:
- id: repository-hygiene-controls
  precedence: 5
  match:
    exact:
    - .gitattributes
    - .gitignore
  authority_classes:
  - TOOL_CONTRACT
  source_types:
  - CONFIGURATION
  extensions:
  - .gitattributes
  - .gitignore
  write_lane: SOURCE_PR
  current_mutation: MANUAL_BOOTSTRAP_ONLY
  future_operations: []
  future_write_route: SEPARATE_FORMAT_CONTRACT_UPDATE
- id: root-bootstrap-and-governance
  precedence: 10
  match:
    exact:
    - README.md
    - bootstrap.md
    - atlas-start-here.md
    - atlas-prime.md
    - atlas-index.md
    - atlas-command-surface.md
    - atlas-command-surface-dashboard.md
    - atlas-protocol-registry.md
    - atlas-knowledge-lifecycle.md
    - atlas-aegis.md
    - athenas-spear.md
    - noctua.md
    - sunsetting-protocol.md
    - controlled-burn-protocol.md
    - phoenix-flare.md
    - phoenix-burn-protocol.md
    - phoenix-reborn.md
  authority_classes:
  - CANONICAL_AUTHORED_SOURCE
  source_types:
  - BOOTSTRAP
  - CORE_DOCTRINE
  - PROTOCOL
  - STANDARD
  extensions:
  - .md
  write_lane: SOURCE_PR
  current_mutation: MANUAL_BOOTSTRAP_ONLY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: codex-authored-source
  precedence: 20
  match:
    prefixes:
    - codex/governance/
    exact:
    - codex/quest-registry.md
    - codex/codex-source-update-standard.md
    - codex/golden-wing.md
    - codex/atlas-feather-archives.md
  authority_classes:
  - CANONICAL_AUTHORED_SOURCE
  - TOOL_CONTRACT
  source_types:
  - CORE_DOCTRINE
  - STANDARD
  - SPECIFICATION
  - REFERENCE
  - REGISTER_VIEW
  extensions:
  - .md
  write_lane: SOURCE_PR
  current_mutation: MANUAL_BOOTSTRAP_ONLY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: structured-authoritative-registers
  precedence: 30
  match:
    prefixes:
    - codex/quests/
    - codex/golden-wing/
  authority_classes:
  - STRUCTURED_AUTHORITATIVE_REGISTER
  source_types:
  - STRUCTURED_REGISTER
  - EVENT_LEDGER
  extensions:
  - .json
  - .jsonl
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations:
  - APPLY_QUEST_DELTA
  - GENERATE_QUEST_BOARD
  future_write_route: VERSIONED_HIGH_LEVEL_REGISTER_OPERATION
- id: monthly-feather-archives
  precedence: 40
  match:
    prefixes:
    - atlas-feather-archives/
  authority_classes:
  - CONTINUITY_PROVENANCE
  source_types:
  - HISTORICAL_RECORD
  - REFERENCE
  extensions:
  - .md
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations:
  - CREATE_FILE
  - APPEND_FEATHER_ENTRY
  - APPLY_SUNSET_LIFECYCLE
  late_addendum_requires_new_versioned_operation: true
- id: project-and-operation-source
  precedence: 50
  match:
    prefixes:
    - projects/
  authority_classes:
  - CANONICAL_AUTHORED_SOURCE
  - CONTINUITY_PROVENANCE
  - PRIVATE_POINTER
  source_types:
  - PROJECT
  - OPERATION
  - RUNBOOK
  - PROTOCOL
  - TEMPLATE
  - REFERENCE
  extensions:
  - .md
  - .json
  - .jsonl
  - .yaml
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: contracts-schemas-policies
  precedence: 60
  match:
    prefixes:
    - specs/
    - schemas/
    - policies/
  authority_classes:
  - TOOL_CONTRACT
  source_types:
  - SPECIFICATION
  - POLICY
  - SCHEMA
  extensions:
  - .md
  - .json
  - .yaml
  write_lane: SOURCE_PR
  current_mutation: MANUAL_BOOTSTRAP_ONLY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: tool-implementation
  precedence: 70
  match:
    prefixes:
    - tools/
  authority_classes:
  - TOOL_IMPLEMENTATION
  - TOOL_CONTRACT
  source_types:
  - SOURCE_CODE
  - TOOL_DOCUMENTATION
  - CONFIGURATION
  extensions:
  - .py
  - .md
  - .toml
  - .json
  - .yaml
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations: []
  future_write_route: SEPARATE_MANUAL_ENGINE_OR_WORKFLOW_UPDATE
- id: tests-and-fixtures
  precedence: 80
  match:
    prefixes:
    - tests/
  authority_classes:
  - TOOL_CONTRACT
  - TOOL_IMPLEMENTATION
  source_types:
  - TEST
  - REFERENCE
  extensions:
  - .py
  - .md
  - .json
  - .jsonl
  - .yaml
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations: []
  future_write_route: SEPARATE_MANUAL_ENGINE_OR_WORKFLOW_UPDATE
- id: templates
  precedence: 90
  match:
    prefixes:
    - templates/
  authority_classes:
  - CANONICAL_AUTHORED_SOURCE
  - TOOL_CONTRACT
  source_types:
  - TEMPLATE
  extensions:
  - .md
  - .json
  - .yaml
  write_lane: SOURCE_PR
  current_mutation: MANUAL_BOOTSTRAP_ONLY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: generated-projections
  precedence: 100
  match:
    prefixes:
    - generated/
    exact:
    - codex/atlas-quest-board.md
  authority_classes:
  - GENERATED_OPERATIONAL_PROJECTION
  source_types:
  - GENERATED_VIEW
  - REGISTER_VIEW
  extensions:
  - .md
  - .json
  write_lane: GENERATED_PR
  current_mutation: DENY
  future_operations:
  - GENERATE_QUEST_BOARD
  future_write_route: VERSIONED_GENERATOR_OPERATION
- id: migration-evidence
  precedence: 110
  match:
    prefixes:
    - migration/
  authority_classes:
  - MIGRATION_EVIDENCE
  - HISTORICAL_REFERENCE
  - PRIVATE_POINTER
  source_types:
  - MIGRATION_RECORD
  - HISTORICAL_RECORD
  - REFERENCE
  extensions:
  - .md
  - .json
  - .jsonl
  - .yaml
  write_lane: MIGRATION_PR
  current_mutation: DENY
  future_operations:
  - CREATE_FILE
  - REPLACE_FILE_FULL
- id: github-workflows
  precedence: 120
  match:
    prefixes:
    - .github/workflows/
  authority_classes:
  - TOOL_IMPLEMENTATION
  source_types:
  - WORKFLOW
  extensions:
  - .yaml
  - .yml
  write_lane: SOURCE_PR
  current_mutation: DENY
  future_operations: []
  future_write_route: SEPARATE_MANUAL_ENGINE_OR_WORKFLOW_UPDATE
source_generated_separation:
  ordinary_generated_files_in_source_pr: false
  source_files_in_generated_refresh_pr: false
  quest_board_exception:
    enabled_for_future_contract: true
    generated_path: codex/atlas-quest-board.md
    required_atomic_inputs:
    - codex/quests/quest-registry.json
    - codex/quests/events/YYYY/YYYY-MM.jsonl
    direct_edit_allowed: false
    note: This is the only initial materialized-operational-projection exception.
    required_contract: VERSIONED_QUEST_TRANSACTION_AND_GENERATOR_CONTRACT
protected_content:
  prohibited_classes:
  - SECRET
  - CREDENTIAL
  - TOKEN
  - MFA_OR_RECOVERY_CODE
  - PRIVATE_KEY
  - SEED_PHRASE
  - REAL_ENV_VALUE
  - RAW_PHI
  - RAW_FINANCE_OR_ACCOUNT_EVIDENCE
  - PRIVATE_RUNTIME_VALUE
  - IP_ADDRESS_OR_NETWORK_MAP
  - DEVICE_REGISTER
  - PROTECTED_EXPORT
  allowed_clean_classes:
  - PUBLIC_CLEAN
  - PRIVATE_CLEAN_SUMMARY
  - POINTER_ONLY
  scanner_is_proof_of_absence: false
  redact_diagnostics: true
operation_boundaries:
  execution_authorized: false
  registered_operations:
    CREATE_FILE:
      contract_defined: true
      execution_authorized: false
    REPLACE_FILE_FULL:
      contract_defined: true
      execution_authorized: false
    APPEND_FEATHER_ENTRY:
      contract_defined: true
      execution_authorized: false
    APPLY_QUEST_DELTA:
      contract_defined: true
      execution_authorized: false
    GENERATE_QUEST_BOARD:
      contract_defined: true
      execution_authorized: false
    APPLY_SUNSET_LIFECYCLE:
      contract_defined: true
      execution_authorized: false
  derived_internal_steps:
  - APPEND_QUEST_EVENTS
  forbidden:
  - DIRECT_MAIN_WRITE
  - FORCE_PUSH
  - AUTOMATIC_MERGE
  - HARD_DELETE
  - MOVE_OR_RENAME
  - ARCHIVE_EXECUTION
  - PACKET_SELECTED_CODE
self_modification:
  normal_packet_may_modify_spear: false
  normal_packet_may_modify_phoenix: false
  normal_packet_may_modify_workflows: false
  separate_preview_execute_required: true
  separate_branch_and_pr_required: true
  noctua_required: true
failure_behavior:
  stale_source: BLOCK
  unknown_path_class: BLOCK
  ambiguous_owner: BLOCK
  prohibited_content: BLOCK_AND_REDACT
  route_failure: BLOCK
  case_collision: BLOCK
  connector_block: STOP_BLOCKED_ACTION_NO_SAME_RUN_RETRY
